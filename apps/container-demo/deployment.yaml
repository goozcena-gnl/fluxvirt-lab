apiVersion: apps/v1
kind: Deployment
metadata:
  name: container-demo
  labels:
    app.kubernetes.io/name: container-demo
    app.kubernetes.io/part-of: fluxvirt-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: container-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: container-demo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=FluxVirt container workload
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
