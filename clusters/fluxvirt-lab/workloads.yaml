apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workloads
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevirt-cr
    - name: cdi-cr
  interval: 10m
  retryInterval: 1m
  timeout: 20m
  path: ./workloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
