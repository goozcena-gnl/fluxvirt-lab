apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt-cr
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevirt-operator
  interval: 10m
  retryInterval: 1m
  timeout: 15m
  path: ./infrastructure/kubevirt/cr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  healthChecks:
    - apiVersion: kubevirt.io/v1
      kind: KubeVirt
      name: kubevirt
      namespace: kubevirt
