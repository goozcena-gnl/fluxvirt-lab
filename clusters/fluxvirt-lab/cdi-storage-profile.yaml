apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cdi-storage-profile
  namespace: flux-system
spec:
  dependsOn:
    - name: cdi-cr
  interval: 10m
  retryInterval: 1m
  timeout: 2m
  path: ./infrastructure/cdi/storage-profile
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
