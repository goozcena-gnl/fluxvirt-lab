apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: container-demo
  namespace: flux-system
spec:
  dependsOn:
    - name: namespaces
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  path: ./apps/container-demo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
