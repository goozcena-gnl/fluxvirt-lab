apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ubuntu-legacy-web
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevirt-cr
    - name: cdi-storage-profile
  interval: 10m
  retryInterval: 1m
  timeout: 30m
  path: ./virtual-machines/ubuntu-legacy-web
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
