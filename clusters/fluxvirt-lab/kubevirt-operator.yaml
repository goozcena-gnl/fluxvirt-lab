apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: namespaces
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./infrastructure/kubevirt/operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
