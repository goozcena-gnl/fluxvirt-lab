apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: fluxvirt-require-baseline
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: Container images must use an explicit non-latest tag or digest.
        foreach:
          - list: request.object.spec.containers
            pattern:
              image: "!*:latest"
    - name: require-resource-requests-and-limits
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: CPU and memory requests and limits are required.
        foreach:
          - list: request.object.spec.containers
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
