apiVersion: v1
kind: Service
metadata:
  name: ubuntu-legacy-web
spec:
  type: NodePort
  selector:
    kubevirt.io/domain: ubuntu-legacy-web
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30022
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
